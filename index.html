<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* popup */
.popup {
  width: 320px;
  background: #1c1c2e;
  border-radius: 16px;
  padding: 20px;
  color: white;
}

.popup h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #2a2a40;
  color: white;
}

/* buttons */
.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

.red { background: #d60000; color: white; }
.dark { background: #333; color: white; }
</style>
</head>

<body>

<div class="overlay">
  <div class="popup">
    <h2>НЭВТРЭХ</h2>

    <input type="text" id="user" placeholder="Нэр">
    <input type="password" id="pass" placeholder="Нууц үг">

    <button class="btn red" onclick="login()">НЭВТРЭХ</button>
    <button class="btn red">НУУЦ ҮГЭЭ МАРТСАН?</button>
    <button class="btn red">БҮРТГҮҮЛЭХ</button>
    <button class="btn dark">ЦУЦЛАХ</button>
  </div>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  alert("Нэвтэрлээ: " + u);
}
</script>

</body>
</html>
