<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>Login System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* popup */
.popup {
  width: 320px;
  background: #1c1c2e;
  border-radius: 16px;
  padding: 20px;
  color: white;
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #2a2a40;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

.red { background: #d60000; color: white; }
.green { background: #00aa55; color: white; }
</style>
</head>

<body>

<div class="overlay">
  <div class="popup">
    <h2>НЭВТРЭХ</h2>

    <input type="text" id="user" placeholder="Нэр">
    <input type="password" id="pass" placeholder="Нууц үг">

    <button class="green" onclick="register()">БҮРТГҮҮЛЭХ</button>
    <button class="red" onclick="login()">НЭВТРЭХ</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
// 🔥 ЭНД ӨӨРИЙН FIREBASE CONFIG ХИЙНЭ
const firebaseConfig = {
  apiKey: "ЧИНИЙ_API_KEY",
  authDomain: "ЧИНИЙ_DOMAIN",
  projectId: "ЧИНИЙ_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🔥 БҮРТГҮҮЛЭХ
function register(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(!u || !p){
    alert("Мэдээллээ бүрэн оруул!");
    return;
  }

  db.collection("users").add({
    username: u,
    password: p,
    time: Date.now()
  });

  alert("Бүртгэгдлээ");
}


// 🔥 НЭВТРЭХ
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(!u || !p){
    alert("Мэдээллээ бүрэн оруул!");
    return;
  }

  db.collection("users")
    .where("username","==",u)
    .where("password","==",p)
    .get()
    .then(snapshot => {
      if(snapshot.empty){
        alert("❌ Буруу мэдээлэл");
      } else {
        alert("✅ Амжилттай нэвтэрлээ");
      }
    });
}
</script>

</body>
</html>
